<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staging Gate // HITL Dashboard</title>
    <!-- Tailwind CSS for instant modern styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Smooth custom transitions */
        .crypto-glow { box-shadow: 0 0 15px rgba(34, 197, 94, 0.2); }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans flex flex-col">

    <!-- Header / Navigation -->
    <header class="border-b border-slate-800 bg-slate-950/50 backdrop-blur px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse crypto-glow"></div>
            <h1 class="text-xl font-bold tracking-tight text-white">EverGreen <span class="text-green-400 font-medium">StagingGate</span></h1>
        </div>
        <div class="flex items-center space-x-4">
            <span class="text-xs bg-slate-800 text-slate-400 px-3 py-1.5 rounded-md border border-slate-700">Environment: Production</span>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-1 flex overflow-hidden">
        
        <!-- Left Sidebar: Payload Queue -->
        <section class="w-1/3 border-r border-slate-800 flex flex-col bg-slate-950/20">
            <div class="p-4 border-b border-slate-800 flex justify-between items-center">
                <h2 class="font-semibold text-slate-300">Pending Approvals</h2>
                <span id="queue-count" class="text-xs font-bold bg-amber-500/10 text-amber-400 px-2.5 py-0.5 rounded-full border border-amber-500/20">0 Queue</span>
            </div>
            
            <!-- List Container -->
            <div id="payload-list" class="flex-1 overflow-y-auto divide-y divide-slate-800/60">
                <!-- Dynamic items will be injected here by JS -->
                <div class="p-8 text-center text-slate-500 text-sm">
                    Loading incoming traffic...
                </div>
            </div>
        </section>

        <!-- Right Pane: Detail Inspection & Actions -->
        <section id="detail-pane" class="w-2/3 flex flex-col p-6 bg-slate-900/40 justify-center items-center text-slate-500">
            <div class="text-center max-w-sm">
                <svg class="w-12 h-12 mx-auto text-slate-700 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                <p class="text-base font-medium text-slate-400">No Payload Selected</p>
                <p class="text-xs text-slate-600 mt-1">Select an item from the pending queue to inspect its contents and execute workflow gates.</p>
            </div>
        </section>

    </main>

    <!-- App JavaScript Logic -->
    <script>
        // --- CONFIGURATION ---
        // Swap this URL out with your actual AWS API Gateway Endpoint URL later
        const API_BASE_URL = "https://yhh5uy8dy0.execute-api.us-east-1.amazonaws.com"; 
        
        let pendingPayloads = [];
        let selectedPayload = null;

        // --- MOCK DATA (For instant frontend testing before AWS is wired) ---
        const loadMockData = () => {
            pendingPayloads = [
                {
                    payload_id: "uuid-1111-2222",
                    client_id: "evergreen_lawn_care",
                    created_at: "2026-05-17T22:14:00Z",
                    raw_data: { client_name: "John Smith", service: "Premium Aeration + Overseeding", quoted_price: 650.00, confidence_score: 0.68 }
                },
                {
                    payload_id: "uuid-3333-4444",
                    client_id: "evergreen_lawn_care",
                    created_at: "2026-05-17T23:02:00Z",
                    raw_data: { client_name: "Alice Dynamic Property", service: "Commercial Shrub Removal", quoted_price: 1200.00, confidence_score: 0.52 }
                }
            ];
            renderList();
        };

        // --- RENDER FUNCTIONS ---
        const renderList = () => {
            const listContainer = document.getElementById("payload-list");
            document.getElementById("queue-count").innerText = `${pendingPayloads.length} Queue`;

            if (pendingPayloads.length === 0) {
                listContainer.innerHTML = `<div class="p-8 text-center text-green-400 text-sm font-medium">✨ System clear. All systems nominal.</div>`;
                return;
            }

            listContainer.innerHTML = pendingPayloads.map(item => `
                <div onclick="selectPayload('${item.payload_id}')" class="p-4 hover:bg-slate-800/40 cursor-pointer transition flex flex-col space-y-2 ${selectedPayload?.payload_id === item.payload_id ? 'bg-slate-800/60 border-l-2 border-green-500' : ''}">
                    <div class="flex justify-between items-start">
                        <span class="text-xs font-mono text-slate-400">${item.payload_id.substring(0,8)}...</span>
                        <span class="text-[10px] bg-red-500/10 text-red-400 border border-red-500/20 px-2 py-0.5 rounded">
                            $${item.raw_data.quoted_price}
                        </span>
                    </div>
                    <div class="text-sm font-semibold text-slate-200">${item.raw_data.client_name || 'Unknown Payload'}</div>
                    <div class="text-xs text-slate-500 flex justify-between">
                        <span>Confidence: ${(item.raw_data.confidence_score * 100).toFixed(0)}%</span>
                        <span>${new Date(item.created_at).toLocaleTimeString()}</span>
                    </div>
                </div>
            `).join('');
        };

        const selectPayload = (id) => {
            selectedPayload = pendingPayloads.find(p => p.payload_id === id);
            renderList();
            renderDetailView();
        };

        const renderDetailView = () => {
            const pane = document.getElementById("detail-pane");
            if (!selectedPayload) return;

            pane.className = "w-2/3 flex flex-col p-6 overflow-y-auto";
            pane.innerHTML = `
                <div class="flex justify-between items-center border-b border-slate-800 pb-4 mb-4">
                    <div>
                        <h3 class="text-lg font-bold text-white">Inspect Payload</h3>
                        <p class="text-xs text-slate-400">ID: ${selectedPayload.payload_id}</p>
                    </div>
                    <div class="flex space-x-3">
                        <button onclick="executeGate('REJECT')" class="px-4 py-2 bg-rose-600/10 hover:bg-rose-600 text-rose-400 hover:text-white border border-rose-500/20 text-sm font-medium rounded-lg transition duration-150 cursor-pointer">
                            Reject & Purge
                        </button>
                        <button onclick="executeGate('APPROVE')" class="px-5 py-2 bg-green-600 hover:bg-green-500 text-white text-sm font-medium rounded-lg shadow-md transition duration-150 cursor-pointer">
                            Approve Release
                        </button>
                    </div>
                </div>

                <!-- Inspect Fields Box -->
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="bg-slate-950/40 border border-slate-800 p-3 rounded-lg">
                        <label class="text-[10px] uppercase tracking-wider text-slate-500 block mb-1">Target Account</label>
                        <span class="text-sm font-medium text-slate-200">${selectedPayload.client_id}</span>
                    </div>
                    <div class="bg-slate-950/40 border border-slate-800 p-3 rounded-lg">
                        <label class="text-[10px] uppercase tracking-wider text-slate-500 block mb-1">Trigger Reason</label>
                        <span class="text-sm font-medium text-amber-400">High Ticket / Volatile Confidence</span>
                    </div>
                </div>

                <!-- Code Block Area -->
                <div class="flex-1 flex flex-col bg-slate-950 border border-slate-800 rounded-xl overflow-hidden">
                    <div class="bg-slate-900 px-4 py-2 text-xs border-b border-slate-800 font-mono text-slate-400 flex justify-between items-center">
                        <span>raw_payload.json</span>
                        <span class="text-green-400">JSON Parsed</span>
                    </div>
                    <textarea id="json-editor" class="flex-1 p-4 bg-slate-950 text-emerald-400 font-mono text-sm focus:outline-none resize-none leading-relaxed">${JSON.stringify(selectedPayload.raw_data, null, 2)}</textarea>
                </div>
            `;
        };

        // --- HTTP API ACTIONS ---
        const executeGate = async (action) => {
            const updatedData = JSON.parse(document.getElementById("json-editor").value);
            const targetId = selectedPayload.payload_id;

            console.log(`Sending execution [${action}] for payload: ${targetId}`, updatedData);

            // Optimistic UI Update: clear out item from active state instantly
            pendingPayloads = pendingPayloads.filter(p => p.payload_id !== targetId);
            selectedPayload = null;
            renderList();
            document.getElementById("detail-pane").className = "w-2/3 flex flex-col p-6 bg-slate-900/40 justify-center items-center text-slate-500";
            document.getElementById("detail-pane").innerHTML = `<div class="text-center text-sm text-green-400">🚀 Executed ${action} successfully!</div>`;

            
            // Un-comment this block when your AWS Lambda backend is fully ready:
            try {
                const response = await fetch(`${API_BASE_URL}/action`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        payload_id: targetId,
                        action: action, // "APPROVE" or "REJECT"
                        modified_data: updatedData
                    })
                });
                if (!response.ok) throw new Error("AWS Infrastructure rejected request execution context.");
            } catch (err) {
                console.error("Critical Network Error syncing gate action to AWS:", err);
            }
            
        };

        // Initialize App
        window.onload = loadMockData;
    </script>
</body>
</html>
